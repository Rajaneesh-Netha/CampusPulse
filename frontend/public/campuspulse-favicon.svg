<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="wave" x1="8" y1="32" x2="56" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Pulse wave / heartbeat line -->
  <polyline
    points="8,34 18,34 22,22 28,44 34,18 40,46 44,30 48,34 56,34"
    stroke="url(#wave)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Campus node dots -->
  <circle cx="18" cy="34" r="3" fill="url(#dot)"/>
  <circle cx="34" cy="18" r="3" fill="url(#dot)"/>
  <circle cx="48" cy="34" r="3" fill="url(#dot)"/>
  <!-- Subtle glow at center -->
  <circle cx="34" cy="18" r="6" fill="#38bdf8" opacity="0.15"/>
</svg>
